# install: conda env create -n qps_latest --file=qps_latest.yml
# update : conda env update -n qps_latest --file=qps_latest.yml --prune
# remove : conda env remove -n qps_latest
# see also https://docs.conda.io/projects/conda/en/latest/user-guide/tasks/manage-environments.html#creating-an-environment-from-an-environment-yml-file
name: qps_latest
channels:
  - conda-forge
dependencies:
  - qgis<3.99
  - python>=3.12
  - pip
  - pyqtgraph
  - defusedxml

  # Development
  - bandit
  - gitpython
  - git-lfs
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-env
  - flake8
  - docutils

  - pip:
      - flake8-qgis

variables:
  QT_MAC_WANTS_LAYER: 1
  PYQTGRAPH_QT_LIB: PyQt5
