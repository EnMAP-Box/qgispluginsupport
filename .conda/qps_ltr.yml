# install: conda env create -n qps_ltr --file=qps_ltr.yml
# update:  conda env update -n qps_ltr --file=qps_ltr.yml --prune
# remove:  conda env remove -n qps_ltr
# see also https://docs.conda.io/projects/conda/en/latest/user-guide/tasks/manage-environments.html#creating-an-environment-from-an-environment-yml-file
name: qps_ltr
channels:
  - conda-forge
dependencies:
  - qgis=3.44
  - python>=3.12
  - pip
  - pyqtgraph
  - defusedxml

  # Development
  - bandit
  - gitpython
  - git-lfs
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-env
  - flake8
  - docutils


  - pip:
      - flake8-qgis

variables:
  QT_MAC_WANTS_LAYER: 1
  PYQTGRAPH_QT_LIB: PyQt5
