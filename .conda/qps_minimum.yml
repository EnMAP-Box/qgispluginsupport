# install: conda env create -n qps_minimum --file=qps_minimum.yml
# update : conda env update -n qps_minimum --file=qps_minimum.yml --prune
# remove : conda env remove -n qps_minimum
# see also https://docs.conda.io/projects/conda/en/latest/user-guide/tasks/manage-environments.html#creating-an-environment-from-an-environment-yml-file
name: qps_minimum
channels:
  - conda-forge
dependencies:
  - qgis=3.40
  - python=3.10
  - gdal=3.9
  - pip
  - pyqtgraph
  - defusedxml

  # Development
  - bandit
  - gitpython
  - git-lfs
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-env
  - flake8
  - docutils

  - pip:
      - flake8-qgis


variables:
  QT_MAC_WANTS_LAYER: 1
  PYQTGRAPH_QT_LIB: PyQt5
