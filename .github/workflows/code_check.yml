name: Code Check

on:
  push:
    branches: [master]
    paths:
      - '**.py'
      - 'tox.ini'
      - '.github/workflows/code_check.yml'
  pull_request:
    paths:
      - '**.py'
      - 'tox.ini'
permissions:
  contents: read

concurrency:
  group: code-check-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}


jobs:
  code_checks:
    name: Code Checks (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.12' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version:  ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install linters
        run: pip install flake8 flake8-qgis bandit
      - name: Run flake8
        run: flake8 --config=tox.ini
      - name: Run bandit
        run: bandit -c tox.ini -r .