name: ❄ Flake8

on:
  push:
    branches: [master]
    paths:
      - '**.py'
      - '**flake8.yml'

  pull_request:
    branches:
      - '**'
    paths:
      - '**.py'

jobs:
  flake8_py3:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Run flake8
        uses: julianwachholz/flake8-action@v2
        with:
          checkName: 'Python Lint'
          plugins: flake8-qgis
          config: tox.ini
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run bandit
        uses: PyCQA/bandit-action@v1
        with:
          ini: tox.ini
          targets: "."
          python-version: 3.12
